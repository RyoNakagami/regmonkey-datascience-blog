vim_commands:
  #-----------------------------------------------------------
  # Insertモードへ
  #-----------------------------------------------------------

  - mode: "Normal"
    category: "Insertモードへ"
    command: "`i`"
    description: "カーソル前に文字を挿入"
    example: ""

  - mode: "Normal"
    category: "Insertモードへ"
    command: "`a`"
    description: "カーソル後に文字を挿入"
    example: ""

  - mode: "Normal"
    category: "Insertモードへ"
    command: "`o`"
    description: "カーソル行の下に新しい行を作成し，その先頭から挿入が開始"
    example: ""

  - mode: "Normal"
    category: "Insertモードへ"
    command: "`I`"
    description: "カーソル行の先頭に文字を挿入"
    example: ""

  - mode: "Normal"
    category: "Insertモードへ"
    command: "`A`"
    description: "カーソル行の末尾に文字を挿入"
    example: ""

  #-----------------------------------------------------------
  # 編集
  #-----------------------------------------------------------

  - mode: "Normal"
    category: "編集"
    command: "`dd`"
    description: "カーソル行を削除"
    example: "`3dd` で3行を削除"

  - mode: "Command-line"
    category: "編集"
    command: "`:%y+`"
    description: "ファイル全体をシステムクリップボードへコピー"
    example: ""

  #-----------------------------------------------------------
  # Movement
  #-----------------------------------------------------------

  - mode: "Normal"
    category: "Movement"
    command: "`0`"
    description: "行頭への移動"
    example: ""

  - mode: "Normal"
    category: "Movement"
    command: "`^`"
    description: "空白文字を除く，行頭への移動"
    example: ""

  - mode: "Normal"
    category: "Movement"
    command: "`$`"
    description: "行末への移動"
    example: ""

  - mode: "Normal"
    category: "Movement"
    command: "`G`"
    description: "ファイル末への移動"
    example: "`gg` で先頭行に移動"

  #-----------------------------------------------------------
  # general
  #-----------------------------------------------------------

  - mode: "Command-line"
    category: "general"
    command: "`:w`"
    description: "ファイルを保存する"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:w!`"
    description: "強制的に保存する（読み取り専用などを無視）"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:q`"
    description: "vimを終了する（未保存変更があると失敗）"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:q!`"
    description: "変更を破棄して終了する"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:wq`"
    description: "保存して終了する"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:wq!`"
    description: "強制的に保存して終了する"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:x`"
    description: "変更があれば保存して終了"
    example: ""

  - mode: "Normal"
    category: "general"
    command: "`ZZ`"
    description: "保存して終了（`:wq`と同じ）"
    example: ""

  - mode: "Normal"
    category: "general"
    command: "`ZQ`"
    description: "保存せずに終了"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:e!`"
    description: "変更を破棄してファイルを再読み込み"
    example: ""

  - mode: "Command-line"
    category: "general"
    command: "`:! <command>`"
    description: "vimから抜けずにコマンドを実行する"
    example: "`:! ls` でカレントディレクトリのファイル一覧を表示"
