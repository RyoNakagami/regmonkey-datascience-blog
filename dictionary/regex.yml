regex_list:
  # ==== 基本メタ文字 ====
  - metachar: '`.`'
    meaning: '任意の1文字'
    pattern_example: '`a.b`'
    match_example: '`acb`, `a9b`'

  - metachar: '`^`'
    meaning: '行頭'
    pattern_example: '`^abc`'
    match_example: '`abcxxx`'

  - metachar: '`$`'
    meaning: '行末'
    pattern_example: '`abc$`'
    match_example: '`xxxabc`'

  - metachar: '`\`'
    meaning: 'エスケープ'
    pattern_example: '`\.`'
    match_example: '`.`'

  - metachar: '`\|`'
    meaning: 'OR'
    pattern_example: '`cat\|dog`'
    match_example: '`cat`, `dog`'

  # ==== 量指定子 ====
  - metachar: '`*`'
    meaning: '0回以上'
    pattern_example: '`ab*`'
    match_example: '`a`, `ab`, `abbb`'

  - metachar: '`+`'
    meaning: '1回以上'
    pattern_example: '`ab+`'
    match_example: '`ab`, `abbb`'

  - metachar: '`?`'
    meaning: '0または1回'
    pattern_example: '`colou?r`'
    match_example: '`color`, `colour`'

  - metachar: '`{n}`'
    meaning: 'n回'
    pattern_example: '`a{3}`'
    match_example: '`aaa`'

  - metachar: '`{n,}`'
    meaning: 'n回以上'
    pattern_example: '`a{2,}`'
    match_example: '`aa`, `aaaa`'

  - metachar: '`{n,m}`'
    meaning: 'n〜m回'
    pattern_example: '`a{2,4}`'
    match_example: '`aa`, `aaa`, `aaaa`'

  # ==== 文字クラス ====
  - metachar: '`[abc]`'
    meaning: 'いずれか1文字'
    pattern_example: '`b[ae]t`'
    match_example: '`bat`, `bet`'

  - metachar: '`[^abc]`'
    meaning: '否定クラス'
    pattern_example: '`[^0-9]`'
    match_example: '`a`, `#`'

  - metachar: '`[a-z]`'
    meaning: '範囲指定'
    pattern_example: '`[a-z]+`'
    match_example: '`hello`'

  - metachar: '`[A-Z]`'
    meaning: '英大文字'
    pattern_example: '`[A-Z]{2}`'
    match_example: '`US`, `JP`'

  - metachar: '`[0-9]`'
    meaning: '数字'
    pattern_example: '`[0-9]+`'
    match_example: '`123`'

  # ==== 短縮文字クラス ====
  - metachar: '`\d`'
    meaning: '数字'
    pattern_example: '`\d{4}`'
    match_example: '`2026`'

  - metachar: '`\D`'
    meaning: '数字以外'
    pattern_example: '`\D+`'
    match_example: '`abc`'

  - metachar: '`\w`'
    meaning: '英数字＋`_`'
    pattern_example: '`\w+`'
    match_example: '`var_1`'

  - metachar: '`\W`'
    meaning: '`\w`以外'
    pattern_example: '`\W+`'
    match_example: '`!!!`'

  - metachar: '`\s`'
    meaning: '空白'
    pattern_example: '`\s+`'
    match_example: '` `, `\t`'

  - metachar: '`\S`'
    meaning: '非空白'
    pattern_example: '`\S+`'
    match_example: '`text`'

  # ==== グループ ====
  - metachar: '`(…)`'
    meaning: 'グループ'
    pattern_example: '`(ab)+`'
    match_example: '`ab`, `abab`'

  # ==== アンカー（行位置の再掲） ====
  - metachar: '`^`'
    meaning: '行の先頭'
    pattern_example: '`^#`'
    match_example: '`# comment`'

  - metachar: '`$`'
    meaning: '行の末尾'
    pattern_example: '`;$`'
    match_example: '`end;`'
