unicode_list:

  - character: "→"
    codepoint: "U+2192"
    name: "RIGHTWARDS ARROW"
    category: "arrow"
    description: "右向き矢印．論理的帰結，関数の写像，状態遷移などを表す際に使用される．"

  - character: "←"
    codepoint: "U+2190"
    name: "LEFTWARDS ARROW"
    category: "arrow"
    description: "左向き矢印．代入演算や逆方向の関係を示す際に使用される．"

  - character: "⇒"
    codepoint: "U+21D2"
    name: "RIGHTWARDS DOUBLE ARROW"
    category: "arrow"
    description: "論理的含意（implication）を表す二重矢印．`A ⇒ B` で「AならばB」．"

  - character: "⇔"
    codepoint: "U+21D4"
    name: "LEFT RIGHT DOUBLE ARROW"
    category: "arrow"
    description: "論理的同値（iff, if and only if）を表す．`A ⇔ B` で「AとBは同値」．"

  - character: "∀"
    codepoint: "U+2200"
    name: "FOR ALL"
    category: "math"
    description: "全称量化子．`∀x ∈ X` で「Xに属する任意のxに対して」を表す．"

  - character: "∃"
    codepoint: "U+2203"
    name: "THERE EXISTS"
    category: "math"
    description: "存在量化子．`∃x ∈ X` で「Xに属するあるxが存在して」を表す．"

  - character: "∈"
    codepoint: "U+2208"
    name: "ELEMENT OF"
    category: "math"
    description: "集合の要素記号．`x ∈ A` で「xはAの要素」を表す．"

  - character: "∉"
    codepoint: "U+2209"
    name: "NOT AN ELEMENT OF"
    category: "math"
    description: "集合の非要素記号．`x ∉ A` で「xはAの要素ではない」を表す．"

  - character: "⊂"
    codepoint: "U+2282"
    name: "SUBSET OF"
    category: "math"
    description: "真部分集合（または部分集合）を表す．文脈により `⊊` と区別．"

  - character: "⊆"
    codepoint: "U+2286"
    name: "SUBSET OF OR EQUAL TO"
    category: "math"
    description: "部分集合（等号含む）を表す．`A ⊆ B` で「AはBの部分集合」．"

  - character: "∪"
    codepoint: "U+222A"
    name: "UNION"
    category: "math"
    description: "和集合．`A ∪ B` で「AとBの和集合」を表す．"

  - character: "∩"
    codepoint: "U+2229"
    name: "INTERSECTION"
    category: "math"
    description: "積集合（共通部分）．`A ∩ B` で「AとBの共通部分」を表す．"

  - character: "∞"
    codepoint: "U+221E"
    name: "INFINITY"
    category: "math"
    description: "無限大．極限や区間の端点として使用．"

  - character: "≠"
    codepoint: "U+2260"
    name: "NOT EQUAL TO"
    category: "math"
    description: "等しくない．`a ≠ b` で「aはbと等しくない」．"

  - character: "≈"
    codepoint: "U+2248"
    name: "ALMOST EQUAL TO"
    category: "math"
    description: "近似的に等しい．数値計算や物理の近似式で使用．"

  - character: "≤"
    codepoint: "U+2264"
    name: "LESS-THAN OR EQUAL TO"
    category: "math"
    description: "以下．`a ≤ b` で「aはb以下」．"

  - character: "≥"
    codepoint: "U+2265"
    name: "GREATER-THAN OR EQUAL TO"
    category: "math"
    description: "以上．`a ≥ b` で「aはb以上」．"

  - character: "°"
    codepoint: "U+00B0"
    name: "DEGREE SIGN"
    category: "symbol"
    description: "度記号．角度（例：`90°`）や温度（例：`25°C`）の表記に使用．"

  - character: "±"
    codepoint: "U+00B1"
    name: "PLUS-MINUS SIGN"
    category: "math"
    description: "プラスマイナス．誤差範囲や解の表記に使用．"

  - character: "·"
    codepoint: "U+00B7"
    name: "MIDDLE DOT"
    category: "punctuation"
    description: "中点．ベクトルの内積や並列語の区切りに使用．"

  - character: "…"
    codepoint: "U+2026"
    name: "HORIZONTAL ELLIPSIS"
    category: "punctuation"
    description: "三点リーダ．省略や継続を示す．"

  - character: "§"
    codepoint: "U+00A7"
    name: "SECTION SIGN"
    category: "symbol"
    description: "節記号．法律文書や論文のセクション番号に使用．"

  - character: "¶"
    codepoint: "U+00B6"
    name: "PILCROW SIGN"
    category: "symbol"
    description: "段落記号．組版・校正で段落の始まりを示す．"

  - character: "©"
    codepoint: "U+00A9"
    name: "COPYRIGHT SIGN"
    category: "symbol"
    description: "著作権表示．"

  - character: "™"
    codepoint: "U+2122"
    name: "TRADE MARK SIGN"
    category: "symbol"
    description: "商標記号．"
